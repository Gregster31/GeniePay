<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>GeniePay</title>
    <meta name="description" content="Pay your entire team on-chain in one transaction. GeniePay is the blockchain payroll platform for global teams — supporting Ethereum, Polygon, Base, Arbitrum, Optimism and more." />
    <meta name="keywords" content="blockchain payroll, crypto payroll, web3 payroll, ethereum payroll, on-chain payments, crypto salary, batch crypto payments, DeFi payroll" />
    <meta name="author" content="GeniePay" />
    <meta name="application-name" content="GeniePay" />
    <link rel="canonical" href="https://geniepay.ca" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://geniepay.ca" />
    <meta property="og:site_name" content="GeniePay" />
    <meta property="og:title" content="GeniePay" />
    <meta property="og:description" content="Pay your entire team on-chain in one transaction. The blockchain payroll platform for global teams — Ethereum, Polygon, Base, Arbitrum and more." />
    <meta property="og:image" content="https://geniepay.ca/geniepay_linkedin.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GeniePay — Blockchain Payroll Platform" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GeniePay" />
    <meta name="twitter:title" content="GeniePay — Blockchain Payroll & Batch Crypto Payments" />
    <meta name="twitter:description" content="Pay your entire team on-chain in one transaction. The blockchain payroll platform for global teams." />
    <meta name="twitter:image" content="https://geniepay.ca/geniepay_linkedin.png" />
    <meta name="twitter:image:alt" content="GeniePay — Blockchain Payroll Platform" />

    <!-- iOS / PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GeniePay" />
    <meta name="theme-color" content="#5D00F2" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/png" href="/geniepay_logov4.png" />
    <link rel="apple-touch-icon" href="/geniepay_logov4.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="https://geniepay.ca/sitemap.xml" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "@id": "https://geniepay.ca",
      "name": "GeniePay",
      "description": "Blockchain payroll and batch crypto payment platform for global teams. Pay employees on-chain in one transaction across Ethereum, Polygon, Base, Arbitrum, and Optimism.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "inLanguage": "en-CA",
      "url": "https://geniepay.ca",
      "image": "https://geniepay.ca/geniepay_linkedin.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "GeniePay",
        "url": "https://geniepay.ca"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://geniepay.ca/#organization",
      "name": "GeniePay",
      "url": "https://geniepay.ca",
      "logo": {
        "@type": "ImageObject",
        "url": "https://geniepay.ca/geniepay_logov4.png"
      },
      "description": "Blockchain payroll and batch crypto payment platform for global teams.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CA"
      }
    }
    </script>
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
