version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      tanstack:
        patterns: ["@tanstack/*"]
      supabase:
        patterns: ["@supabase/*"]
      vite:
        patterns: ["vite", "@vitejs/*", "vitest", "@vitest/*"]
      tailwind:
        patterns: ["tailwindcss", "postcss", "autoprefixer"]
    ignore:
      # wagmi and viem are pinned — breaking changes in these require manual migration
      - dependency-name: wagmi
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: viem
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@wagmi/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
